openapi: "3.0.3"
info:
  title: Dodo Payments — Invoice & Payment Service
  version: "1.0.0"
  description: |
    A minimal Invoice & Payment Service. Businesses create invoices for customers,
    customers pay invoices, and businesses receive signed webhook notifications on state changes.

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key issued at business registration. Format — `Bearer sk_xxxx`

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Invoice not found

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    LineItem:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: integer
          minimum: 1
        unit_amount_cents:
          type: integer
          minimum: 1
          description: Price per unit in USD cents (integer, no floats)
        total_cents:
          type: integer
          description: quantity × unit_amount_cents, computed server-side

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        total_cents:
          type: integer
          description: Sum of all line item totals in USD cents, computed server-side
        due_date:
          type: string
          format: date
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        created_at:
          type: string
          format: date-time

    PaymentAttempt:
      type: object
      properties:
        payment_attempt_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, succeeded, failed]
        psp_ref:
          type: string
          nullable: true
          description: PSP reference ID, present on success
        failure_code:
          type: string
          nullable: true
          description: Failure reason, present on failure

    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

paths:

  /customers:
    post:
      summary: Create a customer
      tags: [Customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  example: Jane Smith
                email:
                  type: string
                  format: email
                  example: jane@example.com
      responses:
        "200":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        "409":
          description: Customer with this email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List customers
      tags: [Customers]
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        "401":
          description: Unauthorized

  /customers/{id}:
    get:
      summary: Get a customer by ID
      tags: [Customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized

  /invoices:
    post:
      summary: Create an invoice
      description: |
        Creates an invoice with line items. The server computes the total —
        never pass a client-supplied total. Invoice is created in `open` state.
      tags: [Invoices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, due_date, line_items]
              properties:
                customer_id:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date
                  example: "2026-06-01"
                line_items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [description, quantity, unit_amount_cents]
                    properties:
                      description:
                        type: string
                        example: Website Design
                      quantity:
                        type: integer
                        minimum: 1
                        example: 1
                      unit_amount_cents:
                        type: integer
                        minimum: 1
                        example: 50000
      responses:
        "200":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        "400":
          description: Validation error (empty line items, invalid amounts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized

    get:
      summary: List invoices
      tags: [Invoices]
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [draft, open, paid, void, uncollectible]
          description: Filter by invoice state
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
        "400":
          description: Invalid state filter
        "401":
          description: Unauthorized

  /invoices/{id}:
    get:
      summary: Get an invoice by ID
      tags: [Invoices]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invoice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        "404":
          description: Invoice not found
        "401":
          description: Unauthorized

  /invoices/{id}/pay:
    post:
      summary: Attempt to pay an invoice
      description: |
        Calls the PSP with the provided card token and updates invoice state.
        Must include an `Idempotency-Key` header — retrying with the same key
        returns the same response without a second PSP call.
        
        **Invoice must be in `open` state.** Attempting to pay a `paid`, `void`,
        or `uncollectible` invoice returns 422.

        **PSP Tokens:**
        - `tok_success` — payment succeeds
        - `tok_insufficient_funds` — payment fails, insufficient_funds
        - `tok_card_declined` — payment fails, card_declined
        - `tok_timeout` — PSP times out after 10s, returns pending
        - `tok_network_error` — connection dropped, returns failed
      tags: [Payments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
          description: Unique key per payment attempt. Reuse returns cached response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_token]
              properties:
                card_token:
                  type: string
                  example: tok_success
      responses:
        "200":
          description: Payment attempt recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentAttempt'
        "404":
          description: Invoice not found
        "409":
          description: Idempotency key reused with different request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "422":
          description: Invalid state transition (invoice already paid, void, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized

  /webhooks:
    post:
      summary: Register a webhook endpoint
      description: |
        Registers a URL to receive signed webhook events. Events delivered:
        - `invoice.created`
        - `invoice.paid`
        - `invoice.payment_failed`

        Each delivery includes headers:
        - `X-Dodo-Signature: hex(HMAC-SHA256(secret, payload))`
        - `X-Dodo-Event: invoice.paid`
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  example: https://your-server.com/webhooks/dodo
      responses:
        "200":
          description: Webhook endpoint registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpoint'
        "400":
          description: Missing or invalid URL
        "401":
          description: Unauthorized
